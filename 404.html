<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הדף לא נמצא · הצדיק מעג׳ור</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="/tzadik-magor-site/assets/favicon.svg" type="image/svg+xml" />
  <style>
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      display:grid; place-items:center; text-align:center; padding:30px;
      background:radial-gradient(1000px 600px at 50% -10%, #241a0e 0%, #0c0a08 60%);
      color:#f4ecd8; font-family:"Frank Ruhl Libre", Georgia, serif;
      overflow:hidden;
    }
    .flame{ font-size:3.6rem; filter:drop-shadow(0 0 16px rgba(255,180,70,.75)); animation:fl 2.4s ease-in-out infinite; }
    @keyframes fl{ 0%,100%{ opacity:1; transform:translateY(0);} 50%{ opacity:.72; transform:translateY(-3px);} }
    h1{ font-size:clamp(3.4rem,14vw,7rem); margin:4px 0 0; font-weight:900; letter-spacing:2px;
      background:linear-gradient(135deg,#f7e7a3,#d8b349,#b4842a); -webkit-background-clip:text; background-clip:text; color:transparent; }
    h2{ font-size:1.7rem; margin:4px 0 10px; color:#f7e7a3; }
    p{ color:#b6a98c; font-family:system-ui,-apple-system,Arial,sans-serif; max-width:460px; margin:0 auto 28px; line-height:1.75; }
    .btns{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    a.b{ display:inline-block; font-family:system-ui,-apple-system,Arial,sans-serif; font-weight:700; padding:13px 28px; border-radius:999px; text-decoration:none; }
    a.gold{ background:linear-gradient(135deg,#f7e7a3,#d8b349,#b4842a); color:#241803; box-shadow:0 12px 30px rgba(216,179,73,.32); }
    a.ghost{ background:rgba(255,255,255,.05); color:#f4ecd8; border:1px solid rgba(216,179,73,.32); }
  </style>
</head>
<body>
  <div>
    <div class="flame">🕯️</div>
    <h1>404</h1>
    <h2>הדף לא נמצא</h2>
    <p>ייתכן שהקישור שגוי או שהדף הוסר. נשיב אתכם הביתה — לזכות הצדיק מעג׳ור, שזכותו תגן עליכם.</p>
    <div class="btns">
      <a class="b gold" id="homeBtn" href="/tzadik-magor-site/">חזרה לדף הבית »</a>
      <a class="b ghost" id="donateBtn" href="/tzadik-magor-site/ner.html">הדלקת נר נשמה</a>
    </div>
  </div>
  <script>
    // base = first path segment (works on github project-page AND on a future root domain)
    var base = (location.pathname.match(/^\/[^\/]+\//) || ['/'])[0];
    document.getElementById('homeBtn').href = base;
    document.getElementById('donateBtn').href = base + "ner.html";
    var fav = document.querySelector('link[rel=icon]'); if (fav) fav.href = base + 'assets/favicon.svg';
    // nicer fonts if available
    var l = document.createElement('link'); l.rel='stylesheet'; l.href = base + 'css/fonts.css'; document.head.appendChild(l);
  </script>
</body>
</html>
